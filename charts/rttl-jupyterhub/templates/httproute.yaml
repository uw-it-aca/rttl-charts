{{- if .Values.global.rttl.features.kgateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  parentRefs:
    - kind: ListenerSet
      name: {{ .Values.global.rttl.features.kgateway.listenerSetName }}
      namespace: {{ .Values.global.rttl.features.kgateway.listenerSetNamespace }}
  hostnames:
    - {{ .Values.global.rttl.features.kgateway.hostname | quote }}
  rules:
    - timeouts:
        request: "0s"
      matches:
        - path:
            type: PathPrefix
            value: {{ trimSuffix "/" .Values.jupyterhub.hub.baseUrl }}/
      backendRefs:
        - name: proxy-public
          port: 80
{{- end }}
